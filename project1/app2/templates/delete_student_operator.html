{% extends "a2.html" %}
{% block m1 %}
<h1>Confirm Delete Student</h1>
{% if data %}{% for k in data %}
<div style="background:#fff;border-radius:14px;padding:32px;box-shadow:0 4px 24px rgba(0,0,0,0.07);max-width:520px;border-left:4px solid #e85347;">
    <div style="background:rgba(232,83,71,0.06);border-radius:8px;padding:14px 16px;margin-bottom:20px;font-size:0.88rem;color:#e85347;"><i class="fas fa-exclamation-triangle me-2"></i> This will permanently delete the student record.</div>
    <form method="post" action="../delete_student_operator1/">
        {% csrf_token %}
        <table style="box-shadow:none;border-radius:0;margin-bottom:16px;">
            <tr><td style="width:120px;font-weight:600;color:#555;font-size:0.85rem;">Name</td><td>{{k.Name}}</td></tr>
            <tr><td style="font-weight:600;color:#555;font-size:0.85rem;">Gender</td><td>{{k.Gender}}</td></tr>
            <tr><td style="font-weight:600;color:#555;font-size:0.85rem;">Address</td><td>{{k.Address}}</td></tr>
            <tr><td style="font-weight:600;color:#555;font-size:0.85rem;">Contact</td><td>{{k.Contact}}</td></tr>
            <tr><td style="font-weight:600;color:#555;font-size:0.85rem;">Email</td><td>{{k.Email}}</td></tr>
        </table>
        <input type="hidden" name="Email" value="{{k.Email}}">
        <button type="submit" name="B1" value="DELETE" style="background:#e85347;"><i class="fas fa-trash me-1"></i> Confirm Delete</button>
    </form>
</div>
{% endfor %}{% endif %}
{% endblock %}
