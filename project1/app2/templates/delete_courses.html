{% extends "a1.html" %}
{% block m1 %}
<h1>Delete Course</h1>
<div style="background:#fff;border-radius:14px;padding:32px;box-shadow:0 4px 24px rgba(0,0,0,0.07);max-width:520px;border-left:4px solid #e85347;">
{% if data %}{% for k in data %}
<form method="post" action="../delete_courses_1/">
    {% csrf_token %}
    <div style="display:flex;flex-direction:column;gap:14px;">
        <div><label style="display:block;font-size:0.82rem;font-weight:600;color:#444;margin-bottom:6px;">Course ID</label><input readonly type="text" name="H1" value="{{k.course_id}}" style="background:#f0f0f8;"></div>
        <div><label style="display:block;font-size:0.82rem;font-weight:600;color:#444;margin-bottom:6px;">Course Name</label><input type="text" name="T1" value="{{k.course_name}}"></div>
        <div><label style="display:block;font-size:0.82rem;font-weight:600;color:#444;margin-bottom:6px;">Fees</label><input type="text" name="T2" value="{{k.fees}}"></div>
        <div><label style="display:block;font-size:0.82rem;font-weight:600;color:#444;margin-bottom:6px;">Duration</label><input type="text" name="T3" value="{{k.duration}}"></div>
        <div style="margin-top:8px;"><button type="submit" name="B1" style="background:#e85347;"><i class="fas fa-trash me-1"></i> Confirm Delete</button></div>
    </div>
</form>
{% endfor %}{% endif %}
</div>
{% endblock %}
