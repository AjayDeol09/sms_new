{% extends "a1.html" %}
{% block m1 %}
<h1>Course Registration</h1>
<div style="background:#fff;border-radius:14px;padding:32px;box-shadow:0 4px 24px rgba(0,0,0,0.07);max-width:480px;">
<form method="post" action="../course_reg/">
    {% csrf_token %}
    <div style="display:flex;flex-direction:column;gap:16px;">
        <div><label style="display:block;font-size:0.82rem;font-weight:600;color:#444;margin-bottom:6px;">Course Name</label><input type="text" name="T1" id="txt1" placeholder="Enter course name"></div>
        <div><label style="display:block;font-size:0.82rem;font-weight:600;color:#444;margin-bottom:6px;">Fees (₹)</label><input type="text" name="T2" id="txt2" placeholder="Enter fees amount"></div>
        <div><label style="display:block;font-size:0.82rem;font-weight:600;color:#444;margin-bottom:6px;">Duration</label><input type="text" name="T3" id="txt3" placeholder="e.g. 6 months"></div>
        <div style="display:flex;gap:12px;margin-top:8px;">
            <button type="submit" name="B1"><i class="fas fa-book me-1"></i> Register Course</button>
            <a href="../admin_home/" style="background:#e2e8f0;color:#555;padding:9px 20px;border-radius:8px;font-size:0.85rem;font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:6px;"><i class="fas fa-arrow-left"></i> Back</a>
        </div>
    </div>
</form>
{% if data %}<div style="margin-top:18px;background:rgba(9,173,149,0.1);border:1px solid rgba(9,173,149,0.3);padding:12px 16px;border-radius:8px;color:#09ad95;font-size:0.88rem;font-weight:600;"><i class="fas fa-check-circle me-2"></i>{{data}}</div>{% endif %}
</div>
{% endblock %}
