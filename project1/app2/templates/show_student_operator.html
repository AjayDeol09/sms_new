{% extends "a2.html" %}
{% block m1 %}
<h1>Student List</h1>
{% if data %}
<div style="display:flex;flex-direction:column;gap:14px;">
    {% for k in data %}
    <div style="background:#fff;border-radius:12px;padding:20px 24px;box-shadow:0 2px 16px rgba(0,0,0,0.06);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;border-left:4px solid #00b09b;">
        <div>
            <div style="font-size:1rem;font-weight:700;color:#0f2027;">{{k.Name}}</div>
            <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:4px;">
                <span style="font-size:0.8rem;color:#888;"><i class="fas fa-venus-mars me-1" style="color:#00b09b;"></i>{{k.Gender}}</span>
                <span style="font-size:0.8rem;color:#888;"><i class="fas fa-map-marker-alt me-1" style="color:#00b09b;"></i>{{k.Address}}</span>
                <span style="font-size:0.8rem;color:#888;"><i class="fas fa-phone me-1" style="color:#00b09b;"></i>{{k.Contact}}</span>
                <span style="font-size:0.8rem;color:#888;"><i class="fas fa-envelope me-1" style="color:#00b09b;"></i>{{k.Email}}</span>
            </div>
        </div>
        <form method="post" action="../view_student_operator/">
            {% csrf_token %}
            <input type="hidden" name="H1" value="{{k.Email}}">
            <button type="submit" name="B1" style="background:linear-gradient(135deg,#00b09b,#96c93d);font-size:0.82rem;padding:8px 18px;border-radius:8px;display:flex;align-items:center;gap:6px;">
                <i class="fas fa-eye"></i> View Details
            </button>
        </form>
    </div>
    {% endfor %}
</div>
{% else %}
<div style="background:#fff;border-radius:12px;padding:40px;text-align:center;box-shadow:0 2px 16px rgba(0,0,0,0.06);">
    <i class="fas fa-users" style="font-size:3rem;color:#d0d0e0;margin-bottom:12px;"></i>
    <p style="color:#888;">No students found.</p>
</div>
{% endif %}
{% endblock %}
