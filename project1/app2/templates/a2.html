<!doctype html>
<html lang="en">
  <head>
    <title>Operator Dashboard | Student Fees Management</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="../static/script/jquery.js/"></script>
    <style>
      :root {
        --sidebar-bg: #0f2027;
        --sidebar-header-bg: #091419;
        --sidebar-accent: #00b09b;
        --sidebar-hover: rgba(0,176,155,0.13);
        --sidebar-text: #a0b4b0;
        --sidebar-text-active: #ffffff;
        --content-bg: #f0f8f7;
        --card-bg: #ffffff;
        --navbar-bg: #ffffff;
        --accent: #00b09b;
        --accent-dark: #009688;
        --text-dark: #0f2027;
        --shadow: 0 4px 24px rgba(0,0,0,0.08);
        --radius: 12px;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'Poppins', sans-serif; background: var(--content-bg); color: var(--text-dark); overflow-x: hidden; }
      a, a:hover, a:focus { color: inherit; text-decoration: none; transition: all 0.25s ease; }
      .wrapper { display: flex; width: 100%; min-height: 100vh; align-items: stretch; }

      /* SIDEBAR */
      #sidebar { min-width: 260px; max-width: 260px; background: var(--sidebar-bg); color: var(--sidebar-text); transition: all 0.35s cubic-bezier(0.4,0,0.2,1); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow-y: auto; z-index: 100; box-shadow: 4px 0 20px rgba(0,0,0,0.15); }
      #sidebar.active { margin-left: -260px; }
      #sidebar .sidebar-header { padding: 24px 20px; background: var(--sidebar-header-bg); border-bottom: 1px solid rgba(255,255,255,0.05); }
      #sidebar .sidebar-header h2 { font-size: 1.1rem; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 10px; }
      #sidebar .sidebar-header .subtitle { display: block; font-size: 0.67rem; color: var(--sidebar-text); margin-top: 4px; letter-spacing: 1.2px; text-transform: uppercase; }
      #sidebar ul.components { padding: 16px 0 10px; flex: 1; }
      #sidebar ul.components > p { color: rgba(160,180,176,0.5); padding: 10px 20px 4px; font-size: 0.67rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; }
      #sidebar ul li a { padding: 11px 20px; font-size: 0.88rem; font-weight: 500; display: flex; align-items: center; gap: 10px; color: var(--sidebar-text); border-left: 3px solid transparent; transition: all 0.2s ease; }
      #sidebar ul li a:hover { color: var(--sidebar-text-active); background: var(--sidebar-hover); border-left-color: var(--sidebar-accent); padding-left: 26px; }
      #sidebar ul li.active>a, a[aria-expanded="true"] { color: var(--sidebar-text-active); background: rgba(0,176,155,0.15); border-left-color: var(--sidebar-accent); }
      a[data-toggle="collapse"] { position: relative; }
      .dropdown-toggle::after { display: block; position: absolute; top: 50%; right: 18px; transform: translateY(-50%); }
      ul ul a { font-size: 0.82rem !important; padding-left: 46px !important; background: rgba(0,0,0,0.15) !important; color: var(--sidebar-text) !important; border-left: none !important; }
      ul ul a:hover { color: #fff !important; background: rgba(0,176,155,0.2) !important; }

      /* NAVBAR */
      .navbar { padding: 14px 28px; background: var(--navbar-bg); border: none; margin-bottom: 28px; box-shadow: 0 2px 16px rgba(0,0,0,0.06); position: sticky; top: 0; z-index: 50; }
      #sidebarCollapse { background: var(--accent); border: none; color: #fff; border-radius: 8px; padding: 8px 18px; font-size: 0.85rem; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; transition: all 0.2s ease; }
      #sidebarCollapse:hover { background: var(--accent-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,176,155,0.35); }

      /* CONTENT */
      #content { width: 100%; min-height: 100vh; background: var(--content-bg); transition: all 0.3s; display: flex; flex-direction: column; }
      .content-area { flex: 1; padding: 0 28px 28px; }
      .content-area > h1 { font-size: 1.5rem; font-weight: 700; color: var(--text-dark); margin-bottom: 24px; padding-bottom: 12px; border-bottom: 2px solid rgba(0,176,155,0.12); position: relative; }
      .content-area > h1::after { content: ''; position: absolute; left: 0; bottom: -2px; width: 50px; height: 2px; background: var(--accent); border-radius: 2px; }
      .content-area > h2 { font-size: 1.2rem; font-weight: 600; color: #09ad95; margin-bottom: 16px; }

      /* TABLES */
      table { width: 100%; border-collapse: separate; border-spacing: 0; background: var(--card-bg); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); margin-bottom: 20px; }
      table th { background: var(--accent); color: #fff; padding: 13px 16px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
      table td { padding: 12px 16px; font-size: 0.87rem; color: #4a5568; border-bottom: 1px solid #eef5f4; vertical-align: middle; }
      table tr:last-child td { border-bottom: none; }
      table tr:hover td { background: rgba(0,176,155,0.04); }

      /* FORMS */
      input[type="text"], input[type="email"], input[type="password"], input[type="number"], select, textarea { display: block; width: 100%; padding: 10px 14px; border: 1.5px solid #d8ecea; border-radius: 8px; font-family: 'Poppins', sans-serif; font-size: 0.87rem; color: var(--text-dark); background: #fafefe; transition: all 0.2s ease; outline: none; margin-bottom: 4px; }
      input[type="text"]:focus, input[type="email"]:focus, input[type="password"]:focus, input[type="number"]:focus, select:focus, textarea:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 3px rgba(0,176,155,0.12); }
      input[type="submit"], input[type="button"] { background: var(--accent); color: #fff; border: none; padding: 10px 24px; border-radius: 8px; font-family: 'Poppins', sans-serif; font-size: 0.87rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; display: inline-block; width: auto; }
      input[type="submit"]:hover, input[type="button"]:hover { background: var(--accent-dark); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,176,155,0.35); }
      button { background: var(--accent); color: #fff; border: none; padding: 9px 20px; border-radius: 8px; font-family: 'Poppins', sans-serif; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; }
      button a { color: #fff !important; }
      button:hover { background: var(--accent-dark); transform: translateY(-1px); }
      input[type="radio"] { width: auto; margin-right: 5px; accent-color: var(--accent); }
      input[type="file"] { font-size: 0.85rem; padding: 8px 12px; }
      input[type="hidden"] { display: none !important; }

      img { border-radius: 10px; border: 3px solid rgba(0,176,155,0.2); object-fit: cover; }
      hr { border-color: #d8ecea; margin: 14px 0; }
      .footer { background: var(--sidebar-bg); color: var(--sidebar-text); text-align: center; padding: 20px; font-size: 0.78rem; margin-top: auto; }

      @media (max-width: 768px) {
        #sidebar { margin-left: -260px; }
        #sidebar.active { margin-left: 0; }
        #sidebarCollapse span { display: none; }
        .content-area { padding: 0 14px 14px; }
      }
    </style>
    <script>
    $(document).ready(function () {
        var b=2; var c=2;
        $('#sidebarCollapse').on('click', function () { $('#sidebar').toggleClass('active'); });
        $("#p2").click(function(){
            if(b==2) { $("#homeSubmenu").slideDown(); b=1; $("#pageSubmenu").slideUp(); c=2; }
            else if(b==1) { $("#homeSubmenu").slideUp(); b=2; }
        });
        $("#p3").click(function(){
            if(c==2) { $("#pageSubmenu").slideDown(); c=1; $("#homeSubmenu").slideUp(); b=2; }
            else if(c==1) { $("#pageSubmenu").slideUp(); c=2; }
        });
    });
    </script>
  </head>

  <body>
  <div class="wrapper">
    <nav id="sidebar">
      <div class="sidebar-header">
        <h2><i class="fas fa-user-tie" style="color:#00b09b;"></i> Operator</h2>
        <span class="subtitle">Operator Dashboard</span>
      </div>
      <ul class="list-unstyled components">
        <p>Navigation</p>
        <li><a href="../operator_home/"><i class="fas fa-home fa-fw"></i> Home</a></li>
        <li><a href="../operator_profile/"><i class="fas fa-id-card fa-fw"></i> Profile</a></li>
        <li><a href="../student_reg_operator/"><i class="fas fa-user-plus fa-fw"></i> Student Add</a></li>
        <li>
          <a href="#pageSubmenu" data-toggle="collapse" aria-expanded="false" class="dropdown-toggle" id="p3">
            <i class="fas fa-list-alt fa-fw"></i> Show
          </a>
          <ul class="collapse list-unstyled" id="pageSubmenu">
            <li><a href="../show_student_operator/"><i class="fas fa-user-graduate fa-fw"></i> Student</a></li>
          </ul>
        </li>
        <li><a href="../changepass_operator/"><i class="fas fa-key fa-fw"></i> Change Password</a></li>
        <li><a href="../logout/" style="color:#e85347;"><i class="fas fa-sign-out-alt fa-fw"></i> Logout</a></li>
      </ul>
    </nav>

    <div id="content">
      <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
          <button type="button" id="sidebarCollapse">
            <i class="fas fa-bars"></i>
            <span>Toggle Sidebar</span>
          </button>
          <div class="ms-auto d-flex align-items-center gap-3">
            <span style="font-size:0.8rem;color:#888;font-weight:500;">Operator Panel</span>
            <div style="width:36px;height:36px;background:linear-gradient(135deg,#00b09b,#96c93d);border-radius:50%;display:flex;align-items:center;justify-content:center;">
              <i class="fas fa-user-tie" style="color:#fff;font-size:0.85rem;"></i>
            </div>
          </div>
        </div>
      </nav>
      <div class="content-area">
        {% block m1 %}
        {% endblock %}
      </div>
      <div class="footer">&copy; All Rights Reserved &mdash; Student Fees Management System</div>
    </div>
  </div>
  </body>
</html>
