{% extends "a1.html" %}
{% block m1 %}
<h1>Edit Admin Data</h1>
<div style="background:#fff;border-radius:14px;padding:32px;box-shadow:0 4px 24px rgba(0,0,0,0.07);max-width:520px;">
{% if data %}{% for k in data %}
<form method="post" action="../edit_admin_1/">
    {% csrf_token %}
    <div style="display:flex;flex-direction:column;gap:16px;">
        <div><label style="display:block;font-size:0.82rem;font-weight:600;color:#444;margin-bottom:6px;">Name</label><input type="text" name="T1" value="{{k.Name}}"></div>
        <div><label style="display:block;font-size:0.82rem;font-weight:600;color:#444;margin-bottom:6px;">Address</label><input type="text" name="T2" value="{{k.Address}}"></div>
        <div><label style="display:block;font-size:0.82rem;font-weight:600;color:#444;margin-bottom:6px;">Contact</label><input type="text" name="T3" value="{{k.Contact}}"></div>
        <div><label style="display:block;font-size:0.82rem;font-weight:600;color:#444;margin-bottom:6px;">Email</label><input type="text" name="T4" value="{{k.Email}}"></div>
        <div style="margin-top:8px;"><button type="submit" name="B1" value="EDIT CHANGES"><i class="fas fa-save me-1"></i> Save Changes</button></div>
    </div>
</form>
{% endfor %}{% endif %}
</div>
{% endblock %}
