{% extends "a2.html" %}
{% block m1 %}
<h1>Change Password</h1>
<div style="background:#fff;border-radius:14px;padding:32px;box-shadow:0 4px 24px rgba(0,0,0,0.07);max-width:480px;">
<form method="post" action="../changepass_operator/">
    {% csrf_token %}
    <div style="display:flex;flex-direction:column;gap:16px;">
      <div><label style="display:block;font-size:0.82rem;font-weight:600;color:#444;margin-bottom:6px;">Old Password</label><input type="password" name="T1" placeholder="Enter old password"></div>
      <div><label style="display:block;font-size:0.82rem;font-weight:600;color:#444;margin-bottom:6px;">New Password</label><input type="password" name="T2" placeholder="Enter new password"></div>
      <div><label style="display:block;font-size:0.82rem;font-weight:600;color:#444;margin-bottom:6px;">Confirm New Password</label><input type="password" name="T3" placeholder="Confirm new password"></div>
      <div style="display:flex;gap:12px;margin-top:8px;">
        <button type="submit" name="B1"><i class="fas fa-key me-1"></i> Update Password</button>
        <a href="../operator_home/" style="background:#e2e8f0;color:#555;padding:9px 20px;border-radius:8px;font-size:0.85rem;font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:6px;"><i class="fas fa-arrow-left"></i> Back</a>
      </div>
    </div>
</form>
{% if data %}<div style="margin-top:18px;padding:12px 16px;border-radius:8px;font-size:0.88rem;font-weight:500;{% if data == 'Password Changed' %}background:rgba(9,173,149,0.1);border:1px solid rgba(9,173,149,0.3);color:#09ad95;{% else %}background:rgba(232,83,71,0.08);border:1px solid rgba(232,83,71,0.3);color:#e85347;{% endif %}"><i class="fas fa-info-circle me-2"></i>{{data}}</div>{% endif %}
</div>
{% endblock %}
