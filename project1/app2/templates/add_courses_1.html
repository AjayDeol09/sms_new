{% extends "a1.html" %}
{% block m1 %}

{% if message %}
    <div style="background:rgba(255,0,0,0.1);border:1px solid rgba(255,0,0,0.3);padding:14px 18px;border-radius:8px;color:#e53e3e;font-size:1rem;font-weight:600;margin-bottom:20px;">
        <i class="fas fa-exclamation-circle me-2"></i>{{ message }}
    </div>
{% endif %}

{% if name %}
    <div style="background:rgba(9,173,149,0.1);border:1px solid rgba(9,173,149,0.3);padding:14px 18px;border-radius:8px;color:#09ad95;font-size:1rem;font-weight:600;margin-bottom:20px;">
        <i class="fas fa-check-circle me-2"></i>{{ name }}
    </div>
{% endif %}

<a href="../show_student_admin/" style="display:inline-flex;align-items:center;gap:6px;background:#e2e8f0;color:#555;padding:9px 18px;border-radius:8px;font-size:0.85rem;font-weight:600;text-decoration:none;"><i class="fas fa-arrow-left me-1"></i> Back</a>

{% endblock %}
